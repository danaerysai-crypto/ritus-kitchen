<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Order History — Ritu's Kitchen</title>
<meta name="description" content="Check your Ritu's Kitchen order history, total spent, and loyalty status.">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
</script>
<style>
:root {
  --green: #244A36;
  --green-dark: #183528;
  --cream: #FFF8ED;
  --cream-soft: #F7EEDC;
  --terracotta: #C8663D;
  --gold: #D99B36;
  --ink: #1F2421;
  --body: #4C544F;
  --muted: #727A75;
  --border: #E4DED2;
  --surface: #FFFFFF;
  --success: #2E7D4F;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--body);
  background: var(--cream);
  line-height: 1.65;
}
h1, h2, h3 { margin: 0; color: var(--ink); }
.container { max-width: 800px; margin: 0 auto; padding: 24px; }
header {
  background: var(--green);
  color: white;
  padding: 28px 24px;
  text-align: center;
}
header h1 { color: white; font-family: 'Georgia', serif; font-size: 28px; margin-bottom: 6px; }
header p { margin: 0; opacity: 0.9; font-size: 15px; }
.card {
  background: var(--surface);
  border-radius: 12px;
  padding: 22px;
  margin-bottom: 18px;
  box-shadow: 0 4px 18px rgba(31,36,33,0.06);
}
.form-group { margin-bottom: 18px; }
label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
input[type="tel"] {
  width: 100%;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 16px;
}
button {
  background: var(--green);
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
}
button:hover { background: var(--green-dark); }
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}
.stat {
  background: var(--cream-soft);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}
.stat-value {
  font-size: 26px;
  font-weight: 700;
  color: var(--green);
}
.stat-label {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th, td {
  text-align: left;
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
th {
  background: var(--cream-soft);
  color: var(--ink);
  font-weight: 600;
}
.empty {
  text-align: center;
  color: var(--muted);
  padding: 32px;
}
.privacy-note {
  font-size: 13px;
  color: var(--muted);
  margin-top: 12px;
  text-align: center;
}
.loyalty-badge {
  display: inline-block;
  background: var(--gold);
  color: var(--ink);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  table { font-size: 13px; }
  th, td { padding: 10px 8px; }
}
</style>
<link rel="apple-touch-icon" href="images/logo-ritus-kitchen-regenerated.png">
  <link rel="icon" type="image/png" href="images/logo-ritus-kitchen-regenerated.png">
</head>
<body>

<header>
  <div class="container">
    <h1>Ritu's Kitchen</h1>
    <p>Your Order History &amp; Loyalty Status</p>
  </div>
</header>

<div class="container">
  <div class="card" id="lookup-card">
    <div class="form-group">
      <label for="phone">Enter your WhatsApp phone number</label>
      <input type="tel" id="phone" placeholder="e.g. 98765 43210" maxlength="15">
    </div>
    <button onclick="lookupHistory()">View My History</button>
    <p class="privacy-note">Your data is only used to show your own order history.</p>
  </div>

  <div id="result-area" style="display:none;">
    <div class="card">
      <div style="text-align:center; margin-bottom: 8px;">
        <span class="loyalty-badge" id="loyalty-badge"></span>
      </div>
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-value" id="total-orders">0</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="total-spent">₹0</div>
          <div class="stat-label">Total Spent</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="avg-order">₹0</div>
          <div class="stat-label">Avg Order</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="favorite-item">-</div>
          <div class="stat-label">Favorite Item</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 14px;">Order Details</h3>
      <div id="orders-table">
        <!-- Orders render here -->
      </div>
    </div>

    <div class="card" style="text-align:center;">
      <p style="margin:0;">Order again on WhatsApp</p>
      <a id="order-again-link" href="#" style="display:inline-block; margin-top:10px; background:var(--terracotta); color:white; padding:12px 22px; border-radius:8px; text-decoration:none; font-weight:600;">
        📱 Order on WhatsApp
      </a>
    </div>
  </div>

  <div class="card" style="text-align:center; margin-top: 24px;">
    <p style="margin:0; color: var(--muted);">
      🏠 <a href="index.html" style="color: var(--green);">Back to Ritu's Kitchen</a> | 
      📧 <a href="mailto:rituskitchen.av@gmail.com" style="color: var(--green);">rituskitchen.av@gmail.com</a>
    </p>
  </div>
</div>

<script>
// Demo order database — in production this should connect to your backend/Sheet
const DEMO_ORDERS = [
  { date: '2026-07-01', customer: 'Priya Sharma', phone: '9876543210', product: "Today's Thali", price: 220, area: 'Verite Guesthouse' },
  { date: '2026-07-03', customer: 'Priya Sharma', phone: '9876543210', product: "Today's Thali", price: 220, area: 'Verite Guesthouse' },
  { date: '2026-07-05', customer: 'Priya Sharma', phone: '9876543210', product: 'Wellness Thali', price: 280, area: 'Verite Guesthouse' },
  { date: '2026-07-07', customer: 'Rahul Mehta', phone: '9123456789', product: "Today's Thali", price: 220, area: 'Gaia Guesthouse' }
];

function normalizePhone(phone) {
  return phone.replace(/\D/g, '').slice(-10);
}

function lookupHistory() {
  const input = document.getElementById('phone').value.trim();
  const phone = normalizePhone(input);

  if (phone.length < 10) {
    alert('Please enter a valid 10-digit phone number.');
    return;
  }

  const orders = DEMO_ORDERS.filter(o => normalizePhone(o.phone) === phone);

  if (orders.length === 0) {
    alert('No orders found for this number. Try 9876543210 for demo.');
    return;
  }

  // Show results
  document.getElementById('lookup-card').style.display = 'none';
  document.getElementById('result-area').style.display = 'block';

  const totalOrders = orders.length;
  const totalSpent = orders.reduce((sum, o) => sum + o.price, 0);
  const avgOrder = Math.round(totalSpent / totalOrders);

  // Favorite item
  const counts = {};
  orders.forEach(o => { counts[o.product] = (counts[o.product] || 0) + 1; });
  const favorite = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];

  // Loyalty badge
  let badge = 'New Customer 💚';
  if (totalOrders >= 20) badge = 'Ritu’s VIP ⭐';
  else if (totalOrders >= 10) badge = 'Loyal Regular 🌟';
  else if (totalOrders >= 5) badge = 'Frequent Foodie 🔥';
  else if (totalOrders >= 2) badge = 'Regular Customer 💙';

  document.getElementById('total-orders').textContent = totalOrders;
  document.getElementById('total-spent').textContent = '₹' + totalSpent;
  document.getElementById('avg-order').textContent = '₹' + avgOrder;
  document.getElementById('favorite-item').textContent = favorite;
  document.getElementById('loyalty-badge').textContent = badge;

  // Build table
  let html = '<table><tr><th>Date</th><th>Product</th><th>Area</th><th>Amount</th></tr>';
  orders.slice().reverse().forEach(o => {
    html += `<tr>
      <td>${o.date}</td>
      <td>${o.product}</td>
      <td>${o.area}</td>
      <td>₹${o.price}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('orders-table').innerHTML = html;

  // Order again link
  document.getElementById('order-again-link').href = `https://wa.me/919043140686?text=Hi%20Ritu,%20I%27d%20like%20to%20order%20my%20usual%20(${favorite}).%20My%20number%20is%20${phone}.`;
}

// Allow Enter key to submit
document.getElementById('phone').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') lookupHistory();
});
</script>

</body>
</html>
