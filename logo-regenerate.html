<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritu's Kitchen Logo — Refined</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
  }
  .logo-canvas {
    width: 1200px;
    height: 1200px;
    background: #b94e2e;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 88px;
  }
  .frame {
    position: absolute;
    top: 36px; left: 36px; right: 36px; bottom: 36px;
    border: 3px solid rgba(245,230,200,0.55);
    pointer-events: none;
  }
  .ornament {
    position: absolute;
    top: 58px;
    width: 170px;
    height: 170px;
    color: rgba(245,230,200,0.75);
  }
  .ornament svg { width: 100%; height: 100%; }
  .ornament.top-left { left: 44px; }
  .ornament.top-right { right: 44px; transform: scaleX(-1); }
  .mandala {
    width: 120px;
    height: 120px;
    margin-bottom: 32px;
    color: #f5e6c8;
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 86px;
    font-weight: 700;
    letter-spacing: 0.10em;
    color: #f5e6c8;
    text-transform: uppercase;
    margin-bottom: 42px;
  }
  .circle-area {
    width: 640px;
    height: 640px;
    position: relative;
    margin-bottom: 18px;
  }
  .circle-text {
    position: absolute;
    inset: 0;
  }
  .circle-text text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 27px;
    font-weight: 600;
    letter-spacing: 0.12em;
    fill: #f5e6c8;
    text-transform: uppercase;
  }
  .house-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 360px;
    height: 360px;
    color: #f5e6c8;
  }
  .house-icon svg { width: 100%; height: 100%; }
  .phone {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    letter-spacing: 0.16em;
    color: #f5e6c8;
  }
</style>
</head>
<body>

<div class="logo-canvas" id="logo">
  <div class="frame"></div>

  <!-- Corner heart ornaments matching original -->
  <div class="ornament top-left">
    <svg viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <!-- Top heart -->
      <path d="M60 25 C60 15 75 10 80 22 C85 34 70 42 60 48 C50 42 35 34 40 22 C45 10 60 15 60 25" fill="none" />
      <!-- Swirl above heart -->
      <path d="M60 12 C55 5 50 8 48 15 C46 22 52 26 58 22" />
      <path d="M60 12 C65 5 70 8 72 15 C74 22 68 26 62 22" />
      <!-- Small heart above -->
      <path d="M60 8 C60 4 65 2 68 6 C70 10 64 14 60 16 C56 14 50 10 52 6 C55 2 60 4 60 8" fill="currentColor" stroke="none" />
      <!-- Left side leaf/heart chain -->
      <path d="M35 50 C25 40 15 45 18 58 C21 70 35 65 45 55" />
      <path d="M30 75 C20 68 12 74 16 84 C20 94 32 88 40 80" />
      <path d="M45 95 C38 88 32 95 36 104 C40 112 50 105 55 98" />
      <!-- Right side small hearts -->
      <path d="M88 48 C88 42 95 40 98 46 C100 52 93 56 88 58 C83 56 76 52 78 46 C81 40 88 42 88 48" fill="currentColor" stroke="none" />
      <path d="M95 78 C95 72 102 70 105 76 C107 82 100 86 95 88 C90 86 83 82 85 76 C88 70 95 72 95 78" fill="currentColor" stroke="none" />
    </svg>
  </div>

  <div class="ornament top-right">
    <svg viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M60 25 C60 15 75 10 80 22 C85 34 70 42 60 48 C50 42 35 34 40 22 C45 10 60 15 60 25" fill="none" />
      <path d="M60 12 C55 5 50 8 48 15 C46 22 52 26 58 22" />
      <path d="M60 12 C65 5 70 8 72 15 C74 22 68 26 62 22" />
      <path d="M60 8 C60 4 65 2 68 6 C70 10 64 14 60 16 C56 14 50 10 52 6 C55 2 60 4 60 8" fill="currentColor" stroke="none" />
      <path d="M35 50 C25 40 15 45 18 58 C21 70 35 65 45 55" />
      <path d="M30 75 C20 68 12 74 16 84 C20 94 32 88 40 80" />
      <path d="M45 95 C38 88 32 95 36 104 C40 112 50 105 55 98" />
      <path d="M88 48 C88 42 95 40 98 46 C100 52 93 56 88 58 C83 56 76 52 78 46 C81 40 88 42 88 48" fill="currentColor" stroke="none" />
      <path d="M95 78 C95 72 102 70 105 76 C107 82 100 86 95 88 C90 86 83 82 85 76 C88 70 95 72 95 78" fill="currentColor" stroke="none" />
    </svg>
  </div>

  <!-- Interwoven mandala matching original -->
  <div class="mandala">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <!-- Center knot -->
      <path d="M50 35 C58 35 63 42 60 50 C57 58 48 58 45 50 C42 42 47 35 55 35 C63 35 68 42 65 50 C62 58 53 58 50 50 C47 42 52 35 60 35 C68 35 73 42 70 50 C67 58 58 58 55 50" />
      <path d="M50 65 C42 65 37 58 40 50 C43 42 52 42 55 50 C58 58 53 65 45 65 C37 65 32 58 35 50 C38 42 47 42 50 50 C53 58 48 65 40 65 C32 65 27 58 30 50 C33 42 42 42 45 50" />
      <path d="M35 50 C35 42 42 37 50 40 C58 43 58 52 50 55 C42 58 35 53 35 45 C35 37 42 32 50 35 C58 38 58 47 50 50 C42 53 35 48 35 40 C35 32 42 27 50 30 C58 33 58 42 50 45" />
      <path d="M65 50 C65 58 58 63 50 60 C42 57 42 48 50 45 C58 42 65 47 65 55 C65 63 58 68 50 65 C42 62 42 53 50 50 C58 47 65 52 65 60 C65 68 58 73 50 70 C42 67 42 58 50 55" />
      <circle cx="50" cy="50" r="46" stroke-width="1.5" />
      <circle cx="50" cy="50" r="40" stroke-width="1" />
    </svg>
  </div>

  <div class="brand-name">Ritu's Kitchen</div>

  <div class="circle-area">
    <svg class="circle-text" viewBox="0 0 640 640">
      <defs>
        <path id="circlePathTop" d="M 320, 320 m -250, 0 a 250,250 0 1,1 500,0 a 250,250 0 1,1 -500,0" />
      </defs>
      <text>
        <textPath href="#circlePathTop" startOffset="50%" text-anchor="middle">
          HOMEY FOOD, AWAY FROM HOME · WHERE GLUTEN-FREE, VEGAN, AND FULL-OF-LOVE MEET
        </textPath>
      </text>
    </svg>

    <!-- Continuous-line house with heart matching original style -->
    <div class="house-icon">
      <svg viewBox="0 0 400 400" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Continuous line: heart flows into house -->
        <path d="M140 170 
                 C130 150 140 130 160 130 
                 C180 130 190 150 200 165 
                 C210 150 220 130 240 130 
                 C260 130 270 150 260 170 
                 C250 195 220 210 200 225 
                 C180 210 150 195 140 170 Z" 
              stroke-width="4.5" />
        <path d="M200 225 L200 245 L120 245 L120 340 L280 340 L280 245 L200 245" />
        <path d="M80 260 L200 150 L320 260 L295 260 L200 170 L105 260 Z" />
        <path d="M105 260 L105 340" />
        <path d="M295 260 L295 340" />
        <path d="M200 170 L200 245" />
        <!-- Door -->
        <path d="M170 340 L170 290 C170 278 230 278 230 290 L230 340" />
        <circle cx="200" cy="315" r="7" fill="currentColor" stroke="none" />
      </svg>
    </div>
  </div>

  <div class="phone">90431 40686</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  setTimeout(() => {
    html2canvas(document.getElementById('logo'), { scale: 3 }).then(canvas => {
      const link = document.createElement('a');
      link.download = 'logo-ritus-kitchen-regenerated.png';
      link.href = canvas.toDataURL();
      link.click();
    });
  }, 2000);
</script>

</body>
</html>
